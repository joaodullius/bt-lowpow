sample:
  description: Designing Low Power Bluetooth LE devices Lesson 4 Exercise 1 - Clock Sources
  name: Low Power Bluetooth LE devices - Lesson 4 Exercise 1 
tests:
  clock_sources.lfxo:
    sysbuild: true
    build_only: true
    extra_args: 
      - CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=n
      - CONFIG_MPSL_PIN_DEBUG=n
    integration_platforms:
      - nrf54l15dk/nrf54l15/cpuapp
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
      - nrf54ls05dk/nrf54ls05a/cpuapp
      - nrf54ls05dk/nrf54ls05b/cpuapp
      - nrf54lv10dk/nrf54lv10a/cpuapp
