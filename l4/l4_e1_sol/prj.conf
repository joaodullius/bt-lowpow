# Logging
CONFIG_LOG=n
CONFIG_SERIAL=n

# Button and LED library
CONFIG_DK_LIBRARY=y

# Memory
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048

# Bluetooth LE
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Nordic_Beacon"

# STEP 9.1 - Enable extended advertising
CONFIG_BT_EXT_ADV=y
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=255
